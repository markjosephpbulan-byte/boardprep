<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d1117"/>

  <!-- Left page of open book -->
  <path d="M7 10 C7 10 7 9 8 9 L15 9.5 L15 23 L8 22.5 C7 22.5 7 21.5 7 21.5 Z"
        fill="#f5c842" opacity="0.9"/>

  <!-- Right page of open book -->
  <path d="M25 10 C25 10 25 9 24 9 L17 9.5 L17 23 L24 22.5 C25 22.5 25 21.5 25 21.5 Z"
        fill="#f5c842" opacity="0.75"/>

  <!-- Book spine / center line -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Lines on left page (text lines) -->
  <line x1="9" y1="13" x2="14" y2="13.2" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="16" x2="14" y2="16.2" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="19" x2="14" y2="19.2" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Lines on right page -->
  <line x1="18" y1="13" x2="23" y2="12.8" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="16" x2="23" y2="15.8" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="19" x2="23" y2="18.8" stroke="#0d1117" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom curve of book -->
  <path d="M7 21.5 Q16 24 25 21.5" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.7"/>
</svg>
