<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BoardPrep PH — Board Exam Learning Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <div>
        <div class="logo-title">BoardPrep <span>PH</span></div>
        <div class="logo-sub">Board Exam Learning Tracker</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-notes-toggle" onclick="toggleNotesSidebar()">
        <span>🗒️</span> Quick Notes
        <span class="notes-badge" id="notesBadge">0</span>
      </button>
      <button class="btn-primary" onclick="openAddSubjectModal()">+ Add Subject</button>
    </div>
  </div>
</header>

<!-- ══ PROGRESS OVERVIEW BAR ═══════════════════════════════════════════════ -->
<section class="progress-overview" id="progressOverview">
  <div class="progress-overview-inner">
    <div class="overview-label">Overall Progress</div>
    <div class="overview-bar-wrap">
      <div class="overview-bar" id="overallBar"><div class="overview-fill" id="overallFill"></div></div>
      <span class="overview-pct" id="overallPct">0%</span>
    </div>
  </div>
  <div class="subject-progress-strip" id="subjectProgressStrip"></div>
</section>

<!-- ══ MAIN CONTENT ════════════════════════════════════════════════════════ -->
<main class="main-content">
  <div class="subjects-grid" id="subjectsGrid">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎓</div>
      <h2>Start your review journey</h2>
      <p>Add your first board exam subject to begin tracking your progress.</p>
      <button class="btn-primary" onclick="openAddSubjectModal()">+ Add Your First Subject</button>
    </div>
  </div>
</main>

<!-- ══ NOTES SIDEBAR ═══════════════════════════════════════════════════════ -->
<aside class="notes-sidebar" id="notesSidebar">
  <div class="notes-sidebar-header">
    <h3>🗒️ Quick Notes</h3>
    <button class="btn-close-sidebar" onclick="toggleNotesSidebar()">✕</button>
  </div>
  <button class="btn-add-note" onclick="openAddNoteModal()">+ New Note</button>
  <div class="notes-list" id="notesList"></div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleNotesSidebar()"></div>

<!-- ══ MODALS ══════════════════════════════════════════════════════════════ -->

<!-- Add/Edit Subject -->
<div class="modal-backdrop" id="subjectModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="subjectModalTitle">Add Subject</h3>
      <button class="modal-close" onclick="closeModal('subjectModal')">✕</button>
    </div>
    <div class="modal-body">
      <label>Subject Name</label>
      <input type="text" id="subjectNameInput" placeholder="e.g. Nursing Fundamentals" />
      <label>Color</label>
      <div class="color-picker-row" id="subjectColorPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('subjectModal')">Cancel</button>
      <button class="btn-primary" id="subjectModalSave" onclick="saveSubject()">Save Subject</button>
    </div>
  </div>
</div>

<!-- Add Subsection -->
<div class="modal-backdrop" id="subsectionModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Sub-Subject</h3>
      <button class="modal-close" onclick="closeModal('subsectionModal')">✕</button>
    </div>
    <div class="modal-body">
      <label>Sub-Subject Name</label>
      <input type="text" id="subsectionNameInput" placeholder="e.g. Vital Signs & Assessment" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('subsectionModal')">Cancel</button>
      <button class="btn-primary" onclick="saveSubsection()">Add Sub-Subject</button>
    </div>
  </div>
</div>

<!-- Add Topic -->
<div class="modal-backdrop" id="topicModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Topic</h3>
      <button class="modal-close" onclick="closeModal('topicModal')">✕</button>
    </div>
    <div class="modal-body">
      <label>Topic Name</label>
      <input type="text" id="topicNameInput" placeholder="e.g. Temperature measurement methods" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('topicModal')">Cancel</button>
      <button class="btn-primary" onclick="saveTopic()">Add Topic</button>
    </div>
  </div>
</div>

<!-- Add/Edit Note -->
<div class="modal-backdrop" id="noteModal">
  <div class="modal modal-note">
    <div class="modal-header">
      <h3 id="noteModalTitle">New Note</h3>
      <button class="modal-close" onclick="closeModal('noteModal')">✕</button>
    </div>
    <div class="modal-body">
      <label>Title</label>
      <input type="text" id="noteTitleInput" placeholder="Note title..." />
      <label>Content</label>
      <textarea id="noteContentInput" rows="6" placeholder="Write your notes here...&#10;&#10;Tip: Use this for formulas, mnemonics, key points!"></textarea>
      <label>Note Color</label>
      <div class="color-picker-row" id="noteColorPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('noteModal')">Cancel</button>
      <button class="btn-primary" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
    </div>
    <div class="modal-body">
      <p id="confirmMessage">Are you sure you want to delete this?</p>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
